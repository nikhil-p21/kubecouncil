name: Verify and Deploy

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy after verification
        required: true
        default: "false"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend dependencies
        run: python -m pip install -e "backend[dev]"
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Backend tests
        run: python -m pytest
        working-directory: backend
      - name: Backend lint
        run: python -m ruff check .
        working-directory: backend
      - name: Backend types
        run: python -m mypy app
        working-directory: backend
      - name: Frontend tests
        run: npm test
        working-directory: frontend
      - name: Frontend lint
        run: npm run lint
        working-directory: frontend
      - name: Frontend build
        run: npm run build
        working-directory: frontend

  containers:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t kubecouncil-backend:${{ github.sha }} backend
      - name: Build frontend image
        run: docker build -t kubecouncil-frontend:${{ github.sha }} frontend
      - name: Push images
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true'
        run: |
          echo "Configure Artifact Registry auth before enabling image push."
          exit 1

  deploy:
    needs: containers
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: |
          echo "Configure GKE credentials and image substitution before enabling deploy."
          exit 1
