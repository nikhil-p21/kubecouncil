    kubecouncil.io/min-replicas: "0"
    kubecouncil.io/max-replicas: "1"
    kubecouncil.io/dependencies: none
    kubecouncil.io/degradation-modes: suspend
    kubecouncil.io/optional: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: analytics-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: analytics-worker
    spec:
      containers:
        - name: app
          image: kubecouncil-demo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: analytics-worker-config
          resources:
            requests:
              cpu: 600m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 768Mi
