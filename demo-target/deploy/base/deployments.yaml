apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  annotations:
    kubecouncil.io/criticality: critical
    kubecouncil.io/min-replicas: "2"
    kubecouncil.io/max-replicas: "5"
    kubecouncil.io/dependencies: checkout
    kubecouncil.io/degradation-modes: none
    kubecouncil.io/optional: "false"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
    spec:
      containers:
        - name: app
          image: kubecouncil-demo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: gateway-config
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
  annotations:
    kubecouncil.io/criticality: critical
    kubecouncil.io/min-replicas: "2"
    kubecouncil.io/max-replicas: "6"
    kubecouncil.io/dependencies: payment,recommendation
    kubecouncil.io/degradation-modes: queue-admission
    kubecouncil.io/optional: "false"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: checkout
  template:
    metadata:
      labels:
        app.kubernetes.io/name: checkout
    spec:
      containers:
        - name: app
          image: kubecouncil-demo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: checkout-config
          resources:
            requests:
              cpu: 450m
              memory: 512Mi
            limits:
              cpu: 900m
              memory: 768Mi
---
