apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubecouncil-ui
  namespace: kubecouncil-system
  labels:
    app.kubernetes.io/name: kubecouncil-ui
    app.kubernetes.io/part-of: kubecouncil
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubecouncil-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubecouncil-ui
        app.kubernetes.io/part-of: kubecouncil
        app.kubernetes.io/component: ui
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: ui
          image: asia-northeast1-docker.pkg.dev/findydevops/kubecouncil/kubecouncil-frontend@sha256:fca3b1c302f24ecf15cd3f6ed2bc7e0c869958260a39684ef6993bcdff3841bb
          ports:
            - {name: http, containerPort: 8080}
          resources:
            requests: {cpu: 25m, memory: 32Mi}
            limits: {cpu: 100m, memory: 128Mi}
          readinessProbe:
            httpGet: {path: /, port: http}
            initialDelaySeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
---
apiVersion: v1
kind: Service
metadata:
  name: kubecouncil-ui
  namespace: kubecouncil-system
  annotations:
    cloud.google.com/backend-config: '{"default":"ui-iap"}'
    cloud.google.com/neg: '{"ingress":true}'
spec:
  selector: {app.kubernetes.io/name: kubecouncil-ui}
  ports:
    - {name: http, port: 8080, targetPort: http}
---
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: ui-iap
  namespace: kubecouncil-system
spec:
  iap:
    enabled: true
    oauthclientCredentials:
      secretName: kubecouncil-iap-oauth
  healthCheck:
    type: HTTP
    requestPath: /
    port: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubecouncil
  namespace: kubecouncil-system
  annotations:
    kubernetes.io/ingress.class: gce
spec:
  defaultBackend:
    service: {name: kubecouncil-ui, port: {number: 8080}}
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service: {name: investigator, port: {number: 8000}}
