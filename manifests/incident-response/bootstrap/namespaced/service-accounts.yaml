apiVersion: v1
kind: ServiceAccount
metadata:
  name: investigator
  namespace: kubecouncil-system
  labels:
    app.kubernetes.io/part-of: kubecouncil
    app.kubernetes.io/component: investigator
  annotations:
    iam.gke.io/gcp-service-account: kc-investigator@findydevops.iam.gserviceaccount.com
automountServiceAccountToken: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: executor
  namespace: kubecouncil-system
  labels:
    app.kubernetes.io/part-of: kubecouncil
    app.kubernetes.io/component: executor
  annotations:
    iam.gke.io/gcp-service-account: kc-executor@findydevops.iam.gserviceaccount.com
automountServiceAccountToken: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: scenario-controller
  namespace: kubecouncil-demo-control
  labels:
    app.kubernetes.io/part-of: kubecouncil
    app.kubernetes.io/component: scenario-controller
    kubecouncil.io/demo-only: "true"
  annotations:
    iam.gke.io/gcp-service-account: kc-scenario-controller@findydevops.iam.gserviceaccount.com
automountServiceAccountToken: true
