apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: investigator-read
  namespace: online-boutique
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: investigator-read
  namespace: online-boutique
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: investigator-read
subjects:
  - kind: ServiceAccount
    name: investigator
    namespace: kubecouncil-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: executor-write
  namespace: online-boutique
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames:
      - currencyservice
      - productcatalogservice
      - checkoutservice
      - shippingservice
      - cartservice
      - emailservice
      - paymentservice
      - frontend
      - recommendationservice
      - adservice
    verbs: ["get", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: executor-write
  namespace: online-boutique
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: executor-write
subjects:
  - kind: ServiceAccount
    name: executor
    namespace: kubecouncil-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: scenario-controller
  namespace: online-boutique
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["recommendationservice", "redis-cart"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: scenario-controller
  namespace: online-boutique
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: scenario-controller
subjects:
  - kind: ServiceAccount
    name: scenario-controller
    namespace: kubecouncil-demo-control
