apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: online-boutique
resources:
  - ../../upstream
  - namespace.yaml
  - enrollment-rbac.yaml
patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: ^(currencyservice|productcatalogservice|checkoutservice|shippingservice|cartservice|emailservice|paymentservice|frontend|recommendationservice|adservice)$
    patch: |-
      - op: add
        path: /metadata/labels/kubecouncil.io~1managed
        value: "true"
      - op: add
        path: /spec/template/metadata/labels/kubecouncil.io~1managed
        value: "true"
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: redis-cart
    patch: |-
      - op: add
        path: /metadata/labels/kubecouncil.io~1protected-dependency
        value: "true"
      - op: add
        path: /spec/template/metadata/labels/kubecouncil.io~1protected-dependency
        value: "true"
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: loadgenerator
    patch: |-
      - op: add
        path: /metadata/labels/kubecouncil.io~1demo-only
        value: "true"
      - op: add
        path: /spec/template/metadata/labels/kubecouncil.io~1demo-only
        value: "true"
  - path: delete-frontend-external.yaml
