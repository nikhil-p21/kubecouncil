apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubecouncil-backend
  labels:
    app.kubernetes.io/name: kubecouncil-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubecouncil-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubecouncil-backend
    spec:
      serviceAccountName: kubecouncil
      containers:
        - name: app
          image: us-docker.pkg.dev/PROJECT_ID/kubecouncil/kubecouncil-backend:TAG
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: kubecouncil-config
          env:
            - name: GOOGLE_CLOUD_PROJECT
              valueFrom:
                configMapKeyRef:
                  name: kubecouncil-deployment-config
                  key: GOOGLE_CLOUD_PROJECT
                  optional: true
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kubecouncil-credentials
                  key: GITHUB_TOKEN
                  optional: true
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kubecouncil-backend
spec:
  selector:
    app.kubernetes.io/name: kubecouncil-backend
  ports:
    - name: http
      port: 8000
      targetPort: http
