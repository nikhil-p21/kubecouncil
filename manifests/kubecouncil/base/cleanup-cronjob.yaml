apiVersion: batch/v1
kind: CronJob
metadata:
  name: kubecouncil-rehearsal-cleanup
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: kubecouncil-rehearsal-cleanup
        spec:
          serviceAccountName: kubecouncil
          restartPolicy: Never
          containers:
            - name: cleanup
              image: us-docker.pkg.dev/PROJECT_ID/kubecouncil/kubecouncil-backend:TAG
              imagePullPolicy: IfNotPresent
              command: ["python", "-m", "app.kubernetes.cleanup"]
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 250m
                  memory: 256Mi
