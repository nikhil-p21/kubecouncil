apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kubecouncil-default-deny-ingress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kubecouncil-allow-frontend-to-backend
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kubecouncil-backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kubecouncil-frontend
      ports:
        - protocol: TCP
          port: 8000
